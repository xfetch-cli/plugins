name: Bug Report
description: Report a plugin issue
labels: [bug]
body:
  - type: input
    id: plugin
    attributes:
      label: Plugin name
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: xfetch version
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [Linux, macOS, Windows]
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
